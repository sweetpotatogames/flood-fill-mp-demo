<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Flood-Fill Dungeon — Room Templates</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #080810;
      color: #c8b99a;
      font-family: 'Courier New', monospace;
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    #hud {
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 7px 14px;
      background: #10101c;
      border-bottom: 1px solid #222238;
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    .hud-title { font-size: 13px; font-weight: bold; color: #f0d080; letter-spacing: 2px; }
    .hud-stat  { font-size: 11px; color: #6a5a4a; }
    .hud-stat span { color: #c8b99a; }

    #player-list { display: flex; gap: 10px; flex-wrap: wrap; margin-left: auto; }

    .p-badge {
      display: flex; align-items: center; gap: 5px;
      font-size: 11px; padding: 2px 8px;
      border-radius: 3px; background: #181828; border: 1px solid #282840;
    }
    .p-badge.me { border-color: #f0d080; color: #f0d080; }
    .p-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }

    #wrap { flex: 1; position: relative; overflow: hidden; }
    #c { display: block; width: 100%; height: 100%; }

    .overlay {
      position: absolute; pointer-events: none;
      background: rgba(8,8,16,0.88); border: 1px solid #222238; border-radius: 4px;
      padding: 9px 13px; font-size: 11px; line-height: 1.85;
    }
    #legend   { bottom: 12px; left: 12px; }
    #controls { bottom: 12px; right: 12px; }

    .leg-row  { display: flex; align-items: center; gap: 8px; }
    .leg-sw   { width: 13px; height: 13px; border-radius: 2px; flex-shrink: 0; }
    .leg-icon { width: 13px; text-align: center; font-size: 12px; }

    #status {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
      font-size: 18px; color: #f0d080; text-align: center; pointer-events: none;
    }
    #minimap {
      position: absolute; top: 10px; right: 10px;
      background: rgba(8,8,16,0.9); border: 1px solid #222238; border-radius: 4px;
    }
  </style>
</head>
<body>

<div id="hud">
  <span class="hud-title">🏰 DUNGEON</span>
  <div class="hud-stat">Rooms: <span id="s-rooms">0</span></div>
  <div class="hud-stat">My explored: <span id="s-my">0</span></div>
  <div class="hud-stat">Team explored: <span id="s-all">0</span></div>
  <div class="hud-stat">Frontier: <span id="s-front">0</span></div>
  <div class="hud-stat">Pos: <span id="s-pos">—</span></div>
  <div class="hud-stat">Room: <span id="s-room">—</span></div>
  <div id="player-list"></div>
</div>

<div id="wrap">
  <canvas id="c"></canvas>
  <canvas id="minimap" width="180" height="140"></canvas>
  <div id="status">Connecting…</div>

  <div class="overlay" id="legend">
    <div class="leg-row"><div class="leg-sw" style="background:#3d2e18;border:1px solid #7a6040"></div> My explored</div>
    <div class="leg-row"><div class="leg-sw" style="background:#1a2030;border:1px solid #304060"></div> Teammate explored</div>
    <div class="leg-row"><div class="leg-sw" style="background:#161620;border:1px solid #2a2a40"></div> Frontier (pre-generated)</div>
    <div style="height:5px"></div>
    <div class="leg-row"><div class="leg-icon">💰</div> Treasure</div>
    <div class="leg-row"><div class="leg-icon">💀</div> Monster</div>
    <div class="leg-row"><div class="leg-icon">⚠</div> Trap</div>
    <div class="leg-row"><div class="leg-icon">✨</div> Shrine</div>
    <div class="leg-row"><div class="leg-icon">🚪</div> Spawn</div>
  </div>

  <div class="overlay" id="controls">
    <div>WASD / ↑↓←→ — Move</div>
    <div style="color:#5a4a3a;margin-top:4px">Open tabs for more players</div>
  </div>
</div>

<script>
// ─────────────────────────────────────────────────────────────────
//  Config
// ─────────────────────────────────────────────────────────────────
const CELL      = 66;   // px — grid spacing per cell
const CELL_PAD  = 2;    // px — gap between cells in same room (floor seam)
const LERP      = 0.13; // camera smoothing
const FLASH_DUR = 700;  // ms — flash on new room generation

const DIR_OFFSETS = { n:[0,-1], s:[0,1], e:[1,0], w:[-1,0] };
const OPPOSITE    = { n:'s', s:'n', e:'w', w:'e' };

// ─────────────────────────────────────────────────────────────────
//  Client-side state
// ─────────────────────────────────────────────────────────────────
const roomMap      = new Map();   // roomId → room data
const cellToRoomId = new Map();   // "x,y" → roomId
const myExp        = new Set();   // roomIds I've explored
const allExp       = new Set();   // roomIds any player explored
const frontierS    = new Set();   // roomIds generated, not yet visited
let   players      = [];
let   playerId     = null;
let   tick         = 0;

// Flash animation
const flashMap = new Map();   // roomId → expiry ms

function applyState(msg) {
  if (msg.type === 'full_state') {
    roomMap.clear(); cellToRoomId.clear();
    myExp.clear(); allExp.clear(); frontierS.clear();

    for (const r of msg.rooms) {
      roomMap.set(r.roomId, r);
      for (const [cx, cy] of r.cells) {
        cellToRoomId.set(`${cx},${cy}`, r.roomId);
      }
    }

    // Detect new rooms for flash
    const now = Date.now();
    for (const r of msg.rooms) {
      if (!flashMap.has(r.roomId)) {
        // On first full_state, don't flash everything
        if (playerId !== null) flashMap.set(r.roomId, now + FLASH_DUR);
      }
    }

    for (const k of msg.myExploredRooms)  myExp.add(k);
    for (const k of msg.allExploredRooms) allExp.add(k);
    for (const k of msg.frontierRooms)    frontierS.add(k);
    players  = msg.players;
    playerId = msg.playerId;
    tick     = msg.tick;
  }
}

// ─────────────────────────────────────────────────────────────────
//  WebSocket
// ─────────────────────────────────────────────────────────────────
const ws = new WebSocket(`${location.protocol === 'https:' ? 'wss:' : 'ws:'}//${location.host}`);

ws.addEventListener('open', () => {
  document.getElementById('status').style.display = 'none';
});
ws.addEventListener('close', () => {
  document.getElementById('status').textContent = '⚠ Disconnected — refresh to reconnect';
  document.getElementById('status').style.display = 'block';
});
ws.addEventListener('message', ev => {
  const prevRoomIds = new Set(roomMap.keys());
  const msg = JSON.parse(ev.data);
  applyState(msg);

  // Flash newly added rooms
  const now = Date.now();
  for (const rid of roomMap.keys()) {
    if (!prevRoomIds.has(rid) && !flashMap.has(rid)) {
      flashMap.set(rid, now + FLASH_DUR);
    }
  }

  updateHUD();
});
ws.addEventListener('error', console.error);

// ─────────────────────────────────────────────────────────────────
//  Input
// ─────────────────────────────────────────────────────────────────
const KEY_DIR = {
  ArrowUp:'n', w:'n', W:'n',
  ArrowDown:'s', s:'s', S:'s',
  ArrowRight:'e', d:'e', D:'e',
  ArrowLeft:'w', a:'w', A:'w',
};
const held = new Set();
let moveInterval = null;

function send(dir) {
  if (ws.readyState === WebSocket.OPEN)
    ws.send(JSON.stringify({ type:'move', dir }));
}

document.addEventListener('keydown', e => {
  const dir = KEY_DIR[e.key];
  if (!dir) return;
  e.preventDefault();
  if (held.has(e.key)) return;
  held.add(e.key);
  send(dir);
  moveInterval = setInterval(() => { if (held.has(e.key)) send(dir); }, 160);
});
document.addEventListener('keyup', e => {
  held.delete(e.key);
  if (held.size === 0) { clearInterval(moveInterval); moveInterval = null; }
});

// ─────────────────────────────────────────────────────────────────
//  HUD
// ─────────────────────────────────────────────────────────────────
function updateHUD() {
  const me = players.find(p => p.id === playerId);
  document.getElementById('s-rooms').textContent  = roomMap.size;
  document.getElementById('s-my').textContent     = myExp.size;
  document.getElementById('s-all').textContent    = allExp.size;
  document.getElementById('s-front').textContent  = frontierS.size;
  if (me) {
    document.getElementById('s-pos').textContent = `(${me.x},${me.y})`;
    const rid = cellToRoomId.get(`${me.x},${me.y}`);
    const room = rid ? roomMap.get(rid) : null;
    document.getElementById('s-room').textContent = room ? `${room.templateId}` : '—';
  }

  const list = document.getElementById('player-list');
  list.innerHTML = '';
  for (const p of players) {
    const b = document.createElement('div');
    b.className = 'p-badge' + (p.id === playerId ? ' me' : '');
    b.innerHTML = `<div class="p-dot" style="background:${p.color}"></div>${p.name}${p.id===playerId?' (you)':''}`;
    list.appendChild(b);
  }
}

// ─────────────────────────────────────────────────────────────────
//  Rendering
// ─────────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const mm     = document.getElementById('minimap');
const mmCtx  = mm.getContext('2d');

const ROOM_TYPE = {
  empty:    { icon: null,  label: '' },
  monster:  { icon: '💀', label: 'monster' },
  treasure: { icon: '💰', label: 'treasure' },
  trap:     { icon: '⚠',  label: 'trap' },
  shrine:   { icon: '✨', label: 'shrine' },
  spawn:    { icon: '🚪', label: 'spawn' },
};

const LAYER = {
  myRoom:    { fill: '#2e2214', stroke: '#8a6a40', floor: '#c89a5a', wallOuter: '#5a4020', alpha: 0.14 },
  teamRoom:  { fill: '#141826', stroke: '#2a3a5a', floor: '#4a6090', wallOuter: '#1a2a40', alpha: 0.08 },
  frontRoom: { fill: '#0e0e1a', stroke: '#1e1e32', floor: null, wallOuter: '#12121e', alpha: 0 },
};

let camX = 0, camY = 0, tgtX = 0, tgtY = 0;

function resize() {
  const dpr = devicePixelRatio;
  canvas.width  = canvas.offsetWidth  * dpr;
  canvas.height = canvas.offsetHeight * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener('resize', resize);
resize();

function toScreen(wx, wy) {
  const W = canvas.offsetWidth, H = canvas.offsetHeight;
  return [W/2 + (wx - camX) * CELL, H/2 + (wy - camY) * CELL];
}

/** Determine fog layer for a room */
function layerForRoom(roomId) {
  if (myExp.has(roomId))      return LAYER.myRoom;
  if (allExp.has(roomId))     return LAYER.teamRoom;
  if (frontierS.has(roomId))  return LAYER.frontRoom;
  return null;
}

/** Build a set of "cellKey:face" strings for all internal edges within a room */
function internalEdges(room) {
  const cellSet = new Set();
  for (const [cx, cy] of room.cells) cellSet.add(`${cx},${cy}`);

  const internal = new Set();
  for (const [cx, cy] of room.cells) {
    for (const [dir, [dx, dy]] of Object.entries(DIR_OFFSETS)) {
      if (cellSet.has(`${cx+dx},${cy+dy}`)) {
        internal.add(`${cx},${cy}:${dir}`);
      }
    }
  }
  return internal;
}

/** Check if a face of a cell is a connector (door) */
function isConnectorFace(room, cx, cy, face) {
  return room.connectors.some(c => c.cellX === cx && c.cellY === cy && c.face === face);
}

/** Check if a connector is linked */
function isLinkedConnector(room, cx, cy, face) {
  return room.connectors.some(c => c.cellX === cx && c.cellY === cy && c.face === face && c.linkedRoomId !== null);
}

function drawMultiCellRoom(room, layer, meCell, ts) {
  const internal = internalEdges(room);
  const cellSize = CELL - CELL_PAD * 2;
  const halfCell = cellSize / 2;
  const isPlayerRoom = meCell !== null;

  // Flash
  const expiry = flashMap.get(room.roomId) || 0;
  const flashT = Math.max(0, (expiry - ts) / FLASH_DUR);
  if (flashT === 0 && flashMap.has(room.roomId)) flashMap.delete(room.roomId);

  // === Draw filled cells ===
  for (const [cx, cy] of room.cells) {
    const [sx, sy] = toScreen(cx, cy);
    const isMe = meCell && cx === meCell[0] && cy === meCell[1];

    // Flash pulse
    if (flashT > 0) {
      ctx.save();
      ctx.globalAlpha = flashT * 0.35;
      ctx.fillStyle = '#5050c0';
      ctx.fillRect(sx - halfCell - 4, sy - halfCell - 4, cellSize + 8, cellSize + 8);
      ctx.restore();
    }

    // Glow for player's cell
    if (isMe) {
      ctx.save();
      const grd = ctx.createRadialGradient(sx, sy, 0, sx, sy, CELL * 1.2);
      grd.addColorStop(0, 'rgba(240,200,74,0.12)');
      grd.addColorStop(1, 'transparent');
      ctx.fillStyle = grd;
      ctx.fillRect(sx - CELL * 1.5, sy - CELL * 1.5, CELL * 3, CELL * 3);
      ctx.restore();
    }

    // Cell fill
    ctx.fillStyle = isMe ? '#2a1800' : (isPlayerRoom ? '#241a0e' : layer.fill);
    ctx.fillRect(sx - halfCell, sy - halfCell, cellSize, cellSize);

    // Floor detail (explored rooms)
    if (layer.floor) {
      const inner = cellSize * 0.5;
      ctx.fillStyle   = isMe ? '#f0c84a' : layer.floor;
      ctx.globalAlpha = isMe ? 0.22 : layer.alpha;
      ctx.fillRect(sx - inner/2, sy - inner/2, inner, inner);
      ctx.globalAlpha = 1;
    }
  }

  // === Fill internal seams (remove gaps between cells in same room) ===
  for (const [cx, cy] of room.cells) {
    const [sx, sy] = toScreen(cx, cy);
    const fillColor = isPlayerRoom ? '#241a0e' : layer.fill;

    for (const [dir, [dx, dy]] of Object.entries(DIR_OFFSETS)) {
      if (internal.has(`${cx},${cy}:${dir}`)) {
        ctx.fillStyle = fillColor;
        if (dir === 'e') {
          ctx.fillRect(sx + halfCell, sy - halfCell, CELL_PAD * 2, cellSize);
        } else if (dir === 's') {
          ctx.fillRect(sx - halfCell, sy + halfCell, cellSize, CELL_PAD * 2);
        }
      }
    }
  }

  // === Draw walls (outer edges only) ===
  ctx.lineWidth = 2;
  for (const [cx, cy] of room.cells) {
    const [sx, sy] = toScreen(cx, cy);

    for (const [dir, [dx, dy]] of Object.entries(DIR_OFFSETS)) {
      // Skip internal edges (no wall between cells in same room)
      if (internal.has(`${cx},${cy}:${dir}`)) continue;

      const isConn = isConnectorFace(room, cx, cy, dir);
      const isLinked = isLinkedConnector(room, cx, cy, dir);

      if (isConn && isLinked) {
        // Linked door — draw door indicator
        ctx.strokeStyle = '#d4a04a';
        ctx.lineWidth = 2;
        drawEdge(ctx, sx, sy, halfCell, dir, true);
      } else if (isConn && !isLinked) {
        // Unlinked connector — potential door (dim)
        ctx.strokeStyle = '#4a3a2a';
        ctx.lineWidth = 1;
        drawEdge(ctx, sx, sy, halfCell, dir, true);
      } else {
        // Solid wall
        ctx.strokeStyle = isPlayerRoom ? '#f0c84a' : layer.stroke;
        ctx.lineWidth = isPlayerRoom ? 2 : 1.5;
        drawEdge(ctx, sx, sy, halfCell, dir, false);
      }
    }
  }

  // === Room type icon at anchor ===
  const explored = layer === LAYER.myRoom || layer === LAYER.teamRoom;
  if (explored && room.type && room.type !== 'empty') {
    const cfg = ROOM_TYPE[room.type];
    if (cfg && cfg.icon) {
      // Draw at the center of the room's bounding box
      let sumX = 0, sumY = 0;
      for (const [cx, cy] of room.cells) { sumX += cx; sumY += cy; }
      const centerX = sumX / room.cells.length;
      const centerY = sumY / room.cells.length;
      const [ix, iy] = toScreen(centerX, centerY);

      ctx.font = room.cells.length > 4 ? '22px serif' : '15px serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.globalAlpha = layer === LAYER.myRoom ? 0.92 : 0.5;
      ctx.fillText(cfg.icon, ix, iy);
      ctx.globalAlpha = 1;
    }
  }
}

/** Draw one edge of a cell */
function drawEdge(ctx, sx, sy, half, dir, isDoor) {
  const doorGap = isDoor ? half * 0.35 : 0;
  ctx.beginPath();

  if (dir === 'n') {
    if (isDoor) {
      ctx.moveTo(sx - half, sy - half);
      ctx.lineTo(sx - doorGap, sy - half);
      ctx.moveTo(sx + doorGap, sy - half);
      ctx.lineTo(sx + half, sy - half);
    } else {
      ctx.moveTo(sx - half, sy - half);
      ctx.lineTo(sx + half, sy - half);
    }
  } else if (dir === 's') {
    if (isDoor) {
      ctx.moveTo(sx - half, sy + half);
      ctx.lineTo(sx - doorGap, sy + half);
      ctx.moveTo(sx + doorGap, sy + half);
      ctx.lineTo(sx + half, sy + half);
    } else {
      ctx.moveTo(sx - half, sy + half);
      ctx.lineTo(sx + half, sy + half);
    }
  } else if (dir === 'w') {
    if (isDoor) {
      ctx.moveTo(sx - half, sy - half);
      ctx.lineTo(sx - half, sy - doorGap);
      ctx.moveTo(sx - half, sy + doorGap);
      ctx.lineTo(sx - half, sy + half);
    } else {
      ctx.moveTo(sx - half, sy - half);
      ctx.lineTo(sx - half, sy + half);
    }
  } else if (dir === 'e') {
    if (isDoor) {
      ctx.moveTo(sx + half, sy - half);
      ctx.lineTo(sx + half, sy - doorGap);
      ctx.moveTo(sx + half, sy + doorGap);
      ctx.lineTo(sx + half, sy + half);
    } else {
      ctx.moveTo(sx + half, sy - half);
      ctx.lineTo(sx + half, sy + half);
    }
  }
  ctx.stroke();
}

/** Draw corridor between linked rooms across connector boundary */
function drawConnectorPassage(room, layer) {
  for (const conn of room.connectors) {
    if (!conn.linkedRoomId) continue;
    // Only draw from the "lower" roomId to avoid double-drawing
    if (conn.linkedRoomId < room.roomId) continue;

    const linkedLayer = layerForRoom(conn.linkedRoomId);
    if (!linkedLayer) continue;

    const [dx, dy] = DIR_OFFSETS[conn.face];
    const [sx, sy] = toScreen(conn.cellX, conn.cellY);
    const [tx, ty] = toScreen(conn.cellX + dx, conn.cellY + dy);

    // Draw a small corridor between the two cells
    const corrW = 12;
    const half = corrW / 2;
    const bestLayer = (layer === LAYER.myRoom || linkedLayer === LAYER.myRoom) ? LAYER.myRoom
                    : (layer === LAYER.teamRoom || linkedLayer === LAYER.teamRoom) ? LAYER.teamRoom
                    : LAYER.frontRoom;

    ctx.fillStyle = bestLayer === LAYER.myRoom   ? '#5a4020'
                  : bestLayer === LAYER.teamRoom ? '#1a2838'
                  : '#0c0c18';

    const cellHalf = (CELL - CELL_PAD * 2) / 2;

    if (conn.face === 'e' || conn.face === 'w') {
      const left  = Math.min(sx, tx) + cellHalf;
      const right = Math.max(sx, tx) - cellHalf;
      ctx.fillRect(left, Math.min(sy, ty) - half, right - left, corrW);
    } else {
      const top    = Math.min(sy, ty) + cellHalf;
      const bottom = Math.max(sy, ty) - cellHalf;
      ctx.fillRect(Math.min(sx, tx) - half, top, corrW, bottom - top);
    }
  }
}

function drawPlayer(sx, sy, p, isMe) {
  const r = isMe ? 11 : 9;
  ctx.save();
  ctx.shadowColor = p.color;
  ctx.shadowBlur  = isMe ? 20 : 10;
  ctx.fillStyle   = p.color;
  ctx.beginPath(); ctx.arc(sx, sy, r, 0, Math.PI*2); ctx.fill();
  ctx.restore();

  ctx.strokeStyle = isMe ? '#fff' : 'rgba(255,255,255,0.4)';
  ctx.lineWidth   = isMe ? 2 : 1;
  ctx.beginPath(); ctx.arc(sx, sy, r, 0, Math.PI*2); ctx.stroke();

  ctx.fillStyle  = isMe ? '#f0d080' : 'rgba(200,185,154,0.65)';
  ctx.font       = `bold ${isMe ? 11 : 10}px 'Courier New', monospace`;
  ctx.textAlign  = 'center';
  ctx.textBaseline = 'alphabetic';
  ctx.fillText(p.name, sx, sy - r - 5);
}

// ─────────────────────────────────────────────────────────────────
//  Minimap
// ─────────────────────────────────────────────────────────────────
function drawMinimap() {
  const MW = mm.width, MH = mm.height;
  mmCtx.fillStyle = 'rgba(8,8,16,0.95)';
  mmCtx.fillRect(0, 0, MW, MH);
  if (roomMap.size === 0) return;

  // Collect all cells
  let minX=Infinity,maxX=-Infinity,minY=Infinity,maxY=-Infinity;
  for (const room of roomMap.values()) {
    for (const [cx, cy] of room.cells) {
      minX=Math.min(minX,cx); maxX=Math.max(maxX,cx);
      minY=Math.min(minY,cy); maxY=Math.max(maxY,cy);
    }
  }

  const rangeX = maxX - minX + 1;
  const rangeY = maxY - minY + 1;
  const sc  = Math.min((MW-10)/Math.max(rangeX,1), (MH-10)/Math.max(rangeY,1), 5);
  const ox  = (MW - rangeX * sc) / 2;
  const oy  = (MH - rangeY * sc) / 2;
  const dot = Math.max(1, sc - 0.5);

  for (const room of roomMap.values()) {
    const layer = layerForRoom(room.roomId);
    if (!layer) continue;

    const col = myExp.has(room.roomId)      ? '#c89a5a'
              : allExp.has(room.roomId)     ? '#2a4060'
              : frontierS.has(room.roomId)  ? '#1a1a28'
              : '#0a0a14';

    for (const [cx, cy] of room.cells) {
      const px = ox + (cx - minX) * sc;
      const py = oy + (cy - minY) * sc;
      mmCtx.fillStyle = col;
      mmCtx.fillRect(px, py, dot, dot);
    }
  }

  // Players
  for (const p of players) {
    const px = ox + (p.x - minX) * sc + dot/2;
    const py = oy + (p.y - minY) * sc + dot/2;
    mmCtx.fillStyle = p.color;
    mmCtx.beginPath();
    mmCtx.arc(px, py, p.id===playerId ? 3 : 2, 0, Math.PI*2);
    mmCtx.fill();
  }
}

// ─────────────────────────────────────────────────────────────────
//  Main render loop
// ─────────────────────────────────────────────────────────────────
function render(ts) {
  requestAnimationFrame(render);
  const W = canvas.offsetWidth, H = canvas.offsetHeight;

  const me = players.find(p => p.id === playerId);
  if (me) { tgtX = me.x; tgtY = me.y; }
  camX += (tgtX - camX) * LERP;
  camY += (tgtY - camY) * LERP;

  ctx.fillStyle = '#080810';
  ctx.fillRect(0, 0, W, H);

  if (!playerId) return;

  // Frustum cull — determine which rooms have visible cells
  const pad = 3;
  const minWX = camX - W/2/CELL - pad, maxWX = camX + W/2/CELL + pad;
  const minWY = camY - H/2/CELL - pad, maxWY = camY + H/2/CELL + pad;

  const visibleRooms = [];
  for (const room of roomMap.values()) {
    let vis = false;
    for (const [cx, cy] of room.cells) {
      if (cx >= minWX && cx <= maxWX && cy >= minWY && cy <= maxWY) { vis = true; break; }
    }
    if (vis) visibleRooms.push(room);
  }

  // Find player's cell
  const meCell = me ? [me.x, me.y] : null;
  const meRoomId = me ? cellToRoomId.get(`${me.x},${me.y}`) : null;

  // Draw connector passages first (behind rooms)
  for (const room of visibleRooms) {
    const layer = layerForRoom(room.roomId);
    if (!layer) continue;
    drawConnectorPassage(room, layer);
  }

  // Draw rooms
  for (const room of visibleRooms) {
    const layer = layerForRoom(room.roomId);
    if (!layer) continue;
    const isPlayerRoom = room.roomId === meRoomId;
    drawMultiCellRoom(room, layer, isPlayerRoom ? meCell : null, ts);
  }

  // Draw players
  for (const p of players) {
    const [sx, sy] = toScreen(p.x, p.y);
    if (sx < -20 || sx > W+20 || sy < -20 || sy > H+20) continue;
    drawPlayer(sx, sy, p, p.id === playerId);
  }

  drawMinimap();
}

requestAnimationFrame(render);
</script>
</body>
</html>
